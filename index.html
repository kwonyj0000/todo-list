<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>오늘 할 일</h1>
            <div class="header-actions">
                <span id="user-email-display"></span>
                <button id="logout-btn" class="btn btn-text">로그아웃</button>
            </div>
        </header>

        <main>
            <div id="loading" class="loading" style="display: none;">
                <p>로딩 중...</p>
            </div>

            <section class="card todo-input-section">
                <div class="card-header">
                    <h2>할 일 추가</h2>
                </div>
                <div class="card-content">
                    <form id="todo-form">
                        <div class="form-group">
                            <div class="input-field">
                                <input
                                    type="text"
                                    id="todo-input"
                                    placeholder="할 일을 입력하세요"
                                    required
                                >
                            </div>
                            <div class="select-field">
                                <select id="priority-select" class="priority-select" aria-label="우선순위 선택">
                                    <option value="low">낮음</option>
                                    <option value="medium" selected>중간</option>
                                    <option value="high">높음</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">추가</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="card todo-list-section">
                <div class="todo-header">
                    <h2>할 일 목록</h2>
                    <div class="header-actions">
                        <div class="filter-group">
                            <label for="priority-filter">필터</label>
                            <select id="priority-filter" class="priority-filter">
                                <option value="all">전체</option>
                                <option value="high">높음</option>
                                <option value="medium">중간</option>
                                <option value="low">낮음</option>
                            </select>
                        </div>
                        <div id="notification-area"></div>
                    </div>
                </div>
                <ul id="todo-list" class="todo-list">
                </ul>
                <div id="empty-state" class="empty-state">
                    할 일이 없습니다. 새로운 할 일을 추가해보세요!
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
